<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="form-header">
        <div class="container container--flex">
            <img src="./images/Vector.svg" alt="imagem de um usuario ilustrativo" class="form-header__image-perfil" />
            <h1 class="form-header__title">Contact Form</h1>
            <p class="form-header__text">Insira os dados de contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="Nome">Nome</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--metade" type="text" id="Nome" placeholder="nome" name="nome">
                        <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome" placeholder="sobrenome" name="sobrenome">
                    </div>
                </div>

        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="Email">Email</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--email" type="text" id="Email" placeholder="ex: email@gmail.com" name="email">
                    
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer>
        Todos os direitos reservados
    </footer>

</body>

</html>
